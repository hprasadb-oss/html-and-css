<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #e94560;
            color: white;
            text-align: center;

            width: 220px;
            padding: 30px;
            border: 5px solid #ffd700;
            margin: 20px;
        }
        .card h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        .card p {
            font-size: 0.9em;
        }
        .outercard {
            background-color:rgb(90, 205, 103) ;
            padding: 40px 20px 20px 20px;
        }
    </style>
</head>
<body>
    <div class="outercard" >
        <div class="card">
            <h2>Thunder Kid</h2> 
            <p>Attack: 95</p>  
            <p>Defence: 72</p>
            <p>Speed: 88</p>
            <p>Special: Lightning Strike</p>
        </div>   
    </div>
 
</body>
</html>
