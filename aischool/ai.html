<!DOCTYPE html>
<html>
<head>
    <title>Haanshika's School</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: powderblue;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* STUDENT CARD */
        .card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            width: 250px;
            margin: 20px auto;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100px;
            border-radius: 50%;
        }

        .progress-bar {
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            background-color: green;
            height: 10px;
            width: 70%;
        }

        .myimages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .myimages img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<nav>
    <a href="ai.html">Home</a>
    <a href="subjects.html">Subjects</a>
    <a href="quiz.html">Quiz</a>
</nav>

<div class="container">

    <h1>Welcome to Haanshika's School</h1>

    <p>A fun place where students learn through interactive lessons.</p>

    <!-- STUDENT CARD -->
    <div class="card">
        <img src="https://via.placeholder.com/100">
        <h3>Student: Alex</h3>
        <p>Grade: 7</p>

        <p>Progress</p>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>

        <p id="progressText">Completed Lessons: 7/10</p>

        <button onclick="increaseProgress()">Complete Lesson</button>
    </div>

    <h2>Why Join Us?</h2>
    <ul>
        <li>Interactive learning</li>
        <li>Friendly teachers</li>
        <li>No bullying environment</li>
    </ul>

    <div class="myimages">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Staples_High_School%2C_Westport%2C_CT.jpg">
        <img src="https://www.the74million.org/wp-content/uploads/2024/12/relevant-absenteeism-pandemic.jpg">
        <img src="https://npr.brightspotcdn.com/dims4/default/6884980/2147483647/strip/true/crop/800x420+0+90/resize/1200x630!/quality/90/?url=http%3A%2F%2Fnpr-brightspot.s3.amazonaws.com%2Flegacy%2Fsites%2Fvpr%2Ffiles%2F201909%2Fschool-desks-istock-maroke-20190927.jpg">
    </div>

</div>

<script>
    let completed = 7;
    let total = 10;

    function increaseProgress() {
        if (completed < total) {
            completed++;
            let percent = (completed / total) * 100;

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressText").innerText =
                "Completed Lessons: " + completed + "/" + total;
        }
    }
</script>

</body>
</html>
