<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flag Image Slider</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Slider container */
        .slider {
            width: 400px;
            max-width: 90%;
            height: 250px;
            overflow: hidden;
            margin: 40px auto 15px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* Holds all images in one row */
        .slides {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        /* Each image */
        .slides img {
            width: 100%;
            height: 250px;
            flex: 0 0 100%;
            object-fit: contain;
        }

        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .buttons button {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            background-color: #1d4ed8;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .buttons button:hover {
            background-color: #1e40af;
        }
    </style>
</head>

<body>
    <!-- Slider -->
    <div class="slider" id="slider">
        <div class="slides" id="slides">
            <img
                src="https://thfvnext.bing.com/th/id/OIP.0HEY0wlYo9iET38FgGQU9AHaE8?w=268&h=180&c=7&r=0&o=7&cb=thfvnextfalcon2&pid=1.7&rm=3"
                alt="mj"
            >

            <img
                src="https://thfvnext.bing.com/th/id/OIP.jNwO7dE9cP35wRJ4U06PbQHaE8?w=268&h=180&c=7&r=0&o=7&cb=thfvnextfalcon2&pid=1.7&rm=3"
                alt="mj"
            >

            <img
                src="https://thfvnext.bing.com/th/id/OIP.LqQ9F6fbIm8I-DqT99KdlQHaEH?w=302&h=180&c=7&r=0&o=7&cb=thfvnextfalcon2&pid=1.7&rm=3"
                alt="mj"
            >
        </div>
    </div>

    <!-- Controls -->
    <div class="buttons">
        <button type="button" id="previousButton">
            Previous
        </button>

        <button type="button" id="nextButton">
            Next
        </button>
    </div>

    <script>
        let currentIndex = 0;

        const slider = document.getElementById("slider");
        const slides = document.getElementById("slides");
        const images = slides.querySelectorAll("img");

        const previousButton =
            document.getElementById("previousButton");

        const nextButton =
            document.getElementById("nextButton");

        const totalSlides = images.length;

        function updateSlider() {
            const slideWidth = slider.clientWidth;

            slides.style.transform =
                `translateX(-${currentIndex * slideWidth}px)`;
        }

        function nextSlide() {
            currentIndex =
                (currentIndex + 1) % totalSlides;

            updateSlider();
        }

        function previousSlide() {
            currentIndex =
                (currentIndex - 1 + totalSlides) % totalSlides;

            updateSlider();
        }

        nextButton.addEventListener("click", nextSlide);
        previousButton.addEventListener("click", previousSlide);

        window.addEventListener("resize", updateSlider);
    </script>
</body>
</html>
